common:
  imu_topic: /livox/imu
  # imu_topic: /mavros/imu/data

  lid_topic: /livox/lidar
  time_offset_lidar_to_imu: 0.0
  time_sync_en: false
mapping:
  acc_cov: 0.1
  b_acc_cov: 0.0001
  b_gyr_cov: 0.0001
  det_range: 100.0
  extrinsic_R:
  - 1
  - 0
  - 0
  - 0
  - 1
  - 0
  - 0
  - 0
  - 1
  # - 0.963621
  # - -0.033193
  # - 0.265203
  # - 0.036607
  # - 0.999298
  # - -0.007940
  # - -0.264754
  # - 0.017359
  # - 0.964160
  # - 0.0
  # - 1.0
  # - 0.0
  # - -0.965652
  # - 0.0
  # - 0.264754
  # - 0.264754
  # - 0.0
  # - 0.964160
  extrinsic_T:
  # - -0.011
  # - -0.02329
  # - 0.04412
  # - -0.011
  # - -0.02329
  # - 0.04412
  - 0.00
  - 0
  - 0.00
  extrinsic_est_en: false
  fov_degree: 360
  gyr_cov: 0.1
pcd_save:
  interval: -1
  pcd_save_en: false
preprocess:
  blind: 0.5
  lidar_type: 2
  scan_line: 4
publish:
  dense_publish_en: true
  path_en: false
  scan_bodyframe_pub_en: false
  scan_publish_en: true
  debug_circular_scan_publish_en: false
  debug_circular_cloud_radius: 2.0
  no_point_filter_scan_publish_en: true
wxx:
  # Lidar_Odom = Lidar_wrt_Body_R*(Body_Odom + Lidar_wrt_Body_T)
  Lidar_wrt_Body_R:
      # [  0.000000,  0.9656520,  0.2598390,
    #   -1.0000000,  0.0000000,  0.0000000,
    #   0.00000000,  -0.2598390,  0.9656520 ]
    
    # [  0.9659258,  0.0000000,  0.258819,
    #   0.0000000,  1.0000000,  0.0000000,
    #   -0.258819,  0.0000000,  0.9659258 ]

    # [  0.000000,  0.9656520,  0.2598390,
    #   -1.0000000,  0.0000000,  0.0000000,
    #   0.00000000,  -0.2598390,  0.9656520 ]

    # [  0.000000,  0.9656520,  0.2598390,
    #   -1.0000000,  0.0000000,  0.0000000,
    #   0.00000000,  -0.2598390,  0.9656520 ]
        # [0.9659258,0, 0.2588190,
        #  0,         1,         0,
        # -0.2588190,0, 0.9659258]
    # [  0.000000,  0.8660254037,  0.5,
    #   -1.0000000,  0.0000000,  0.0000000,
    #   0.00000000,  -0.5,   0.8660254037 ]
        [ 1,0, 0,
          0,1, 0,
          0,0, 1]
    # [  0.000000,  -0.9656520,  0.2598390, 
    #   1.0000000,  0.0000000,  0.0000000,
    #   0.00000000,  0.2598390,  0.9656520 ] 

  
  Lidar_wrt_Body_T:
  - 0
  - 0
  - 0
  initial_map_from_pcd: false
  map_incremental: true
  initial_map_pcd_name: new1.pcd
  save_new_map_to_pcd: true
  new_map_pcd_name: new.pcd

  # sched_setaffinity
  sched_setaffinity_en:     true
  cpu_core_num:             8
  sched_setaffinity_cores:  [0, 1, 2] # only need 3 cores

  # cpu_monitor
  cpu_monitor_en:           true
  cpu_monitor_filter_type:  0         # 0:SimpleMovingAverageFilter; 1:ExponentialMovingAverageFilter; 2:LowPassFilter
  cpu_monitor_filter_filter_param1:   15 # window_size for SimpleMovingAverageFilter; alpha for ExponentialMovingAverageFilter; cutoff_freq for LowPassFilter
  cpu_monitor_filter_filter_param2:   10 # nouse for SimpleMovingAverageFilter and ExponentialMovingAverageFilter; sample_rate for LowPassFilter
  cpu_monitor_freq:   10              # note: for LowPassFilter, sample_rate 应该始终大于或等于 cpu_monitor_freq, 而且是 cutoff_freq 的至少 2 倍（根据奈奎斯特定理）
