services:
  fastlio:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: fastlio-jetson:latest
    network_mode: host
    privileged: true
    environment:
      - DISPLAY=${DISPLAY}
      - ROS_MASTER_URI=http://localhost:11311
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
      - ./PCD:/catkin_ws/src/fast_lio/PCD
    stdin_open: true
    tty: true
